remote: http://localhost:18888

duration: 5s

# Object expiration. Omit for the default 1h TTL, set a duration like `24h`, or
# `never` to persist objects indefinitely (e.g. for storage/COGS analysis).
# ttl: never

workloads:
  - name: attachments
    mode: throughput
    organizations: 1000
    file_sizes:
      p50: 50 KiB
      p99: 200 KiB
    actions:
      writes: 10
      reads: 0
      deletes: 0
  - name: profiling
    concurrency: 8
    file_sizes:
      p50: 15 KiB
      p99: 100 KiB
  - name: replays
    concurrency: 16
    file_sizes:
      p50: 25 KiB
      p99: 400 KiB
  - name: nodestore
    concurrency: 32
    file_sizes:
      p50: 5 KiB
      p99: 20 KiB
  - name: snapshots
    mode: batch
    concurrency: 2
    organizations: 1000
    file_sizes:
      p50: 200 KiB
      p99: 1 MiB
      max: 1 MiB
    actions:
      writes: 20000
      reads: 0
      deletes: 0
  - name: large-uploads
    concurrency: 4
    organizations: 100
    file_sizes:
      p50: 20 MiB
      p99: 100 MiB
    multipart:
      concurrency: 4
      part_size: 10 MiB
    actions:
      writes: 100
      reads: 0
      deletes: 0
