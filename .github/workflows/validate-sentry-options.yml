name: Validate sentry-options schema

on:
  pull_request:
    paths:
      - 'sentry-options/schemas/**'

permissions:
  contents: read

jobs:
  validate:
    uses: getsentry/sentry-options/.github/workflows/validate-schema.yml@1.0.1
    secrets: inherit
    with:
      schemas-path: sentry-options/schemas
